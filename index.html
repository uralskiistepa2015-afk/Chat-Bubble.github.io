<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Чат-бабл (Chat-Bubbl)</title>
<!-- Импорт шрифта для игривого стиля -->
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
<style>
/* Основные стили в стиле bubble gum */
body {
  margin: 0;
  font-family: 'Bubblegum Sans', cursive;
  background: linear-gradient(135deg, #ffe6f0, #e0f7fa);
  color: #333;
}

/* Общие стили */
a {
  text-decoration: none;
  color: inherit;
}
button {
  cursor: pointer;
  border: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-family: 'Bubblegum Sans', cursive;
  font-size: 1rem;
  transition: all 0.3s ease;
}

/* Цвета кнопок с неоновым эффектом */
.btn-primary { background-color: #ff69b4; color: white; box-shadow: 0 0 10px #ff69b4; }
.btn-primary:hover { box-shadow: 0 0 15px #ff69b4; transform: scale(1.05); }

.btn-secondary { background-color: #40e0d0; color: white; box-shadow: 0 0 10px #40e0d0; }
.btn-secondary:hover { box-shadow: 0 0 15px #40e0d0; transform: scale(1.05); }

.btn-accent { background-color: #ba55d3; color: white; box-shadow: 0 0 10px #ba55d3; }
.btn-accent:hover { box-shadow: 0 0 15px #ba55d3; transform: scale(1.05); }

/* Панель шапки и меню */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(135deg, #ff69b4, #ba55d3);
  padding: 10px 20px;
}
.header h1 {
  margin: 0;
  font-family: 'Bubblegum Sans', cursive;
  font-size: 2em;
  color: #fff;
  text-shadow: 0 0 5px #fff;
}
.header button {
  background: #fff;
  color: #ba55d3;
  font-weight: bold;
}

/* Общий контейнер */
.container {
  padding: 10px;
  max-width: 1200px;
  margin: auto;
}

/* Аутентификация и профиль */
.auth-form, .profile, .edit-profile, .new-post {
  background: rgba(255,255,255,0.6);
  border-radius: 20px;
  padding: 15px;
  margin: 10px 0;
  max-width: 400px;
  margin-left: auto; margin-right: auto;
  box-shadow: 0 0 15px #aaa;
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Весь интерфейс Bubble-серии элементов */
.bubble {
  display: inline-block;
  background: #ffd1dc; /* Мягкий розовый фон */
  border-radius: 50px;
  padding: 10px 20px;
  margin: 5px 0;
  box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
  position: relative;
  transition: all 0.3s ease;
}
.bubble:hover {
  box-shadow: inset 0 0 20px rgba(255,255,255,0.7);
  transform: scale(1.02);
}
.bubble:after {
  content: "";
  display: block;
  position: absolute;
  right: -15px;
  top: 50%;
  width: 30px;
  height: 30px;
  background: #ffd1dc;
  border-radius: 50%;
  transform: translateY(-50%) scale(1);
  transition: all 0.3s ease;
}
.bubble:hover:after {
  box-shadow: 0 0 10px #ffd1dc;
  transform: translateY(-50%) scale(1.2);
}

/* Посты */
.post-card {
  background: #fff8dc;
  border-radius: 20px;
  overflow: hidden;
  margin: 10px 0;
  max-width: 600px;
  margin-left: auto; margin-right: auto;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
}
.post-card:hover {
  transform: scale(1.01);
}
.post-image {
  width: 100%;
  display: block;
  border-radius: 20px 20px 0 0;
  max-height: 400px;
  object-fit: cover;
}
.post-content {
  padding: 10px 15px;
}
.post-buttons {
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
}
.icon-btn {
  font-size: 1.5em;
  padding: 5px 10px;
  border-radius: 50%;
  transition: all 0.3s ease;
}
.icon-btn:hover {
  box-shadow: 0 0 10px #999;
  transform: scale(1.1);
}
.likes, .comments {
  font-size: 0.9em;
  margin-top: 5px;
}
.comment {
  padding: 5px 10px;
  background: #ffe0e6;
  border-radius: 20px;
  margin: 5px 0;
}

/* Профиль */
.profile-header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-top: 10px;
}
.avatar {
  width: 80px;
  height: 80px;
  background: #ffd1dc;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid #ba55d3;
}
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.profile-info {
  flex: 1;
}
.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
}
.stat {
  text-align: center;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 10px;
  margin-top: 10px;
}
.grid img {
  width: 100%;
  border-radius: 15px;
  object-fit: cover;
  cursor: pointer;
  box-shadow: 0 0 10px #ccc;
  transition: all 0.3s ease;
}
.grid img:hover {
  transform: scale(1.05);
}

/* Сообщения */
.chat-container {
  max-height: 300px;
  overflow-y: auto;
  padding: 10px;
  background: #e0f7fa;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.message {
  max-width: 70%;
  padding: 10px;
  border-radius: 20px;
  background: #ffd1dc;
  align-self: flex-start;
  position: relative;
  box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
  transition: all 0.3s ease;
}
.message.you {
  background: #40e0d0;
  align-self: flex-end;
  color: #fff;
}
.message:before {
  content: "";
  position: absolute;
  bottom: 0;
  width: 20px;
  height: 20px;
  background: inherit;
  border-radius: 50%;
  transform: translateY(50%) translateX(-50%);
}

@media(max-width: 600px){
  body {
    font-size: 0.9em;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>Чат-бабл</h1>
  <div>
    <button class="btn-secondary" id="btn-login">Вход / Регистрация</button>
    <button class="btn-accent" id="btn-profile" style="display:none;">Профиль</button>
    <button class="btn-primary" id="btn-logout" style="display:none;">Выход</button>
  </div>
</div>

<div class="container" id="main-area">

  <!-- Экран авторизации -->
  <div id="auth-section" style="display:flex; flex-direction:column; align-items:center; margin-top:20px;">
    <h2>Добро пожаловать в Чат-бабл!</h2>
    <div class="auth-form" style="width:100%; max-width:300px;">
      <h3>Войти / Регистрация</h3>
      <input type="text" id="username" placeholder="Имя пользователя" style="width:100%; margin-bottom:10px;"/>
      <input type="email" id="email" placeholder="Email" style="width:100%; margin-bottom:10px;"/>
      <input type="password" id="password" placeholder="Пароль" style="width:100%; margin-bottom:10px;"/>
      <button class="btn-primary" id="auth-btn">Войти / Зарегистрироваться</button>
    </div>
  </div>

  <!-- Профиль -->
  <div id="profile-section" style="display:none;">
    <h2>Профиль</h2>
    <div class="profile-header">
      <div class="avatar" id="profile-avatar"><img src="" alt="Аватар"></div>
      <div class="profile-info">
        <h3 id="profile-name"></h3>
        <p id="profile-bio">Био: Пока пусто...</p>
        <button class="btn-secondary" id="edit-profile-btn">Редактировать профиль</button>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><strong id="post-count">0</strong> постов</div>
      <div class="stat"><strong id="followers-count">0</strong> подписчиков</div>
      <div class="stat"><strong id="following-count">0</strong> подписок</div>
    </div>
    <button class="btn-accent" id="new-post-btn" style="margin-top:10px;">Создать пост</button>
    <h3>Ваши публикации</h3>
    <div class="grid" id="user-posts"></div>
  </div>

  <!-- Лента новостей -->
  <div id="feed-section" style="display:none;">
    <h2>Лента новостей</h2>
    <div id="posts-feed"></div>
  </div>

  <!-- Создание поста -->
  <div id="new-post-section" style="display:none;">
    <h2>Создать пост</h2>
    <div class="new-post" style="width:100%; max-width:400px; margin:auto;">
      <input type="file" id="post-media" accept="image/*,video/*" style="width:100%; margin-bottom:10px;"/>
      <textarea id="post-caption" placeholder="Напишите подпись..." style="width:100%; height:80px; margin-bottom:10px; border-radius:15px; border: none; padding:10px; font-family: 'Bubblegum Sans', cursive;"></textarea>
      <button class="btn-primary" id="post-submit">Опубликовать</button>
      <button class="btn-secondary" id="post-cancel" style="margin-left:10px;">Отмена</button>
    </div>
  </div>

  <!-- Профиль редактирование -->
  <div id="edit-profile-section" style="display:none;">
    <h2>Редактировать профиль</h2>
    <div class="edit-profile" style="width:100%; max-width:400px; margin:auto;">
      <label>Аватар:</label><br/>
      <input type="file" id="edit-avatar" accept="image/*" style="margin-bottom:10px;"/><br/>
      <label>Имя:</label><br/>
      <input type="text" id="edit-name" style="width:100%; margin-bottom:10px;"/><br/>
      <label>Био:</label><br/>
      <textarea id="edit-bio" style="width:100%; height:80px; margin-bottom:10px; border-radius:15px; border: none; padding:10px; font-family: 'Bubblegum Sans', cursive;"></textarea><br/>
      <button class="btn-primary" id="save-profile-btn">Сохранить</button>
      <button class="btn-secondary" id="cancel-edit-profile" style="margin-left:10px;">Отмена</button>
    </div>
  </div>

  <!-- Сообщения -->
  <div id="messages-section" style="display:none;">
    <h2>Диалог с <span id="dialog-user"></span></h2>
    <div class="chat-container" id="chat-messages"></div>
    <div style="display:flex; margin-top:10px;">
      <input type="text" id="message-input" placeholder="Текст сообщения" style="flex:1; border-radius:20px; border: none; padding:10px; font-family: 'Bubblegum Sans', cursive; margin-right:10px;"/>
      <button class="btn-primary" id="send-message">Отправить</button>
    </div>
    <button class="btn-secondary" id="close-chat" style="margin-top:10px;">Назад</button>
  </div>

</div>

<!-- Уведомления -->
<div id="notification" class="bubble" style="position:fixed; top:20px; right:20px; display:none; z-index:999; font-family: 'Bubblegum Sans', cursive;"></div>

<script>
/* Локальное хранилище и глобальные переменные */
let users = JSON.parse(localStorage.getItem('users') || '{}');
let currentUser = null;
let posts = JSON.parse(localStorage.getItem('posts') || '[]');
let messages = JSON.parse(localStorage.getItem('messages') || '[]');
let followings = JSON.parse(localStorage.getItem('followings') || '{}');

function saveData() {
  localStorage.setItem('users', JSON.stringify(users));
  localStorage.setItem('posts', JSON.stringify(posts));
  localStorage.setItem('messages', JSON.stringify(messages));
  localStorage.setItem('followings', JSON.stringify(followings));
}

function showNotification(text) {
  const notif = document.getElementById('notification');
  notif.innerText = text;
  notif.style.display='block';
  notif.style.opacity=0;
  notif.style.transition='opacity 0.5s ease';
  setTimeout(()=>{ notif.style.opacity=1; },50);
  setTimeout(()=>{ notif.style.opacity=0; notif.style.display='none'; },3000);
}

/* Инициализация элементов */
const authSection = document.getElementById('auth-section');
const profileSection = document.getElementById('profile-section');
const feedSection = document.getElementById('feed-section');
const newPostSection = document.getElementById('new-post-section');
const editProfileSection = document.getElementById('edit-profile-section');
const messagesSection = document.getElementById('messages-section');

const btnLogin = document.getElementById('btn-login');
const btnProfile = document.getElementById('btn-profile');
const btnLogout = document.getElementById('btn-logout');

const authBtn = document.getElementById('auth-btn');
const usernameInput = document.getElementById('username');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');

const profileName = document.getElementById('profile-name');
const profileBio = document.getElementById('profile-bio');
const profileAvatar = document.getElementById('profile-avatar');
const postCountEl = document.getElementById('post-count');
const followersCountEl = document.getElementById('followers-count');
const followingCountEl = document.getElementById('following-count');
const userPostsContainer = document.getElementById('user-posts');

const btnNewPost = document.getElementById('new-post-btn');
const postsFeed = document.getElementById('posts-feed');

const btnEditProfile = document.getElementById('edit-profile-btn');
const btnSaveProfile = document.getElementById('save-profile-btn');
const btnCancelEdit = document.getElementById('cancel-edit-profile');

const inputEditName = document.getElementById('edit-name');
const inputEditBio = document.getElementById('edit-bio');
const inputEditAvatar = document.getElementById('edit-avatar');

const btnPostCancel = document.getElementById('post-cancel');
const btnPostSubmit = document.getElementById('post-submit');
const inputPostMedia = document.getElementById('post-media');
const inputPostCaption = document.getElementById('post-caption');

const btnCloseChat = document.getElementById('close-chat');
const btnSendMessage = document.getElementById('send-message');
const chatMessages = document.getElementById('chat-messages');
const messageInput = document.getElementById('message-input');

const dialogUserSpan = document.getElementById('dialog-user');

/* Время последней активности для уведомлений */
let lastNotificationTime = 0;

/* Объекты для текущего режима */
let currentView = 'auth'; // auth, profile, feed, newPost, editProfile, messages
let currentChatUser = null;

/* Обработчики */
document.getElementById('btn-login').addEventListener('click', ()=> {
  toggleAuth();
});

document.getElementById('auth-btn').addEventListener('click', ()=> {
  handleAuth();
});

document.getElementById('btn-profile').addEventListener('click', ()=> {
  showProfile();
});
document.getElementById('btn-logout').addEventListener('click', ()=> {
  logout();
});
document.getElementById('new-post-btn').addEventListener('click', ()=> {
  showNewPost();
});
document.getElementById('edit-profile-btn').addEventListener('click', ()=> {
  showEditProfile();
});
document.getElementById('save-profile-btn').addEventListener('click', ()=> {
  saveProfile();
});
document.getElementById('cancel-edit-profile').addEventListener('click', ()=> {
  showProfile();
});
document.getElementById('post-cancel').addEventListener('click', ()=> {
  showProfile();
});
document.getElementById('post-submit').addEventListener('click', ()=> {
  submitPost();
});
document.getElementById('btn-logout').addEventListener('click', ()=> {
  logout();
});
document.getElementById('close-chat').addEventListener('click', ()=> {
  showFeed();
});
document.getElementById('send-message').addEventListener('click', ()=> {
  sendMessage();
});

/* Вход/регистрация */
function handleAuth() {
  const username = usernameInput.value.trim();
  const email = emailInput.value.trim().toLowerCase();
  const password = passwordInput.value.trim();

  if (!username || !email || !password) {
    showNotification('Заполните все поля!');
    return;
  }
  // Проверка, есть ли пользователь
  let userKey = Object.keys(users).find(k => users[k].email===email);
  if (userKey) {
    // Войти
    if (users[userKey].password===password) {
      currentUser = users[userKey];
      showNotification('Добро пожаловать снова, ' + currentUser.username + '!');
      showProfile();
    } else {
      showNotification('Неверный пароль!');
    }
  } else {
    // Регистрация
    const id = 'user_' + Date.now();
    users[id] = {
      id,
      username,
      email,
      password,
      bio: '',
      avatar: '', // можно добавить случайное изображение
      followers: [],
      following: []
    };
    currentUser = users[id];
    saveData();
    showNotification('Регистрация успешна, ' + currentUser.username + '!');
    showProfile();
  }
}

/* Показ профиля */
function showProfile() {
  currentView='profile';
  authSection.style.display='none';
  profileSection.style.display='block';
  feedSection.style.display='none';
  newPostSection.style.display='none';
  editProfileSection.style.display='none';
  messagesSection.style.display='none';

  // Обновление данных профиля
  profileName.innerText = currentUser.username;
  profileBio.innerText = currentUser.bio || 'Био: Пока пусто...';
  // Аватар по умолчанию
  if (currentUser.avatar) {
    document.querySelector('#profile-avatar img').src = currentUser.avatar;
  } else {
    document.querySelector('#profile-avatar img').src='https://i.imgur.com/8Km9tLw.png';
  }
  // счетчики постов
  const userPosts = posts.filter(p => p.authorId===getCurrentUserId());
  postCountEl.innerText = userPosts.length;
  // подписчики и подписки
  let followersList = users[getCurrentUserId()].followers || [];
  let followingList = users[getCurrentUserId()].following || [];
  followersCountEl.innerText=followersList.length;
  followingCountEl.innerText=followingList.length;

  // Показываем посты пользователя
  userPostsContainer.innerHTML='';
  userPosts.forEach(p => {
    const card = document.createElement('div');
    card.className='post-card';
    let mediaTag='';
    if (p.mediaType==='image') {
      mediaTag = `<img src="${p.mediaSrc}" class="post-image"/>`;
    } else if (p.mediaType==='video') {
      mediaTag = `<video src="${p.mediaSrc}" class="post-image" controls></video>`;
    }
    card.innerHTML=`
      ${mediaTag}
      <div class="post-content">
        <p>${p.caption}</p>
      </div>
    `;
    userPostsContainer.appendChild(card);
  });
}

/* Выход */
function logout() {
  currentUser=null;
  showNotification('Вы вышли из аккаунта');
  toggleAuth();
}

/* Переключение между входом и профилем */
function toggleAuth() {
  if (currentUser) {
    // Есть пользователь
    authSection.style.display='none';
    document.getElementById('btn-login').style.display='none';
    document.getElementById('btn-profile').style.display='block';
    document.getElementById('btn-logout').style.display='block';
    showFeed();
  } else {
    // Нет пользователя
    authSection.style.display='flex';
    document.getElementById('btn-login').style.display='block';
    document.getElementById('btn-profile').style.display='none';
    document.getElementById('btn-logout').style.display='none';
    
    // Показываем авторизацию
    document.getElementById('auth-section').style.display='flex';
    profileSection.style.display='none';
    feedSection.style.display='none';
    newPostSection.style.display='none';
    editProfileSection.style.display='none';
    messagesSection.style.display='none';
  }
}

/* Показ ленты */
function showFeed() {
  currentView='feed';
  authSection.style.display='none';
  profileSection.style.display='none';
  feedSection.style.display='block';
  newPostSection.style.display='none';
  editProfileSection.style.display='none';
  messagesSection.style.display='none';
  renderFeed();
}

/* Рендер ленты постов */
function renderFeed() {
  postsFeed.innerHTML='';
  // Показывать посты от подписанных и своих
  const userId = getCurrentUserId();
  const following = users[userId].following || [];
  const feedPosts = posts.filter(p => p.authorId===userId || following.includes(p.authorId));
  // Сортировка по дате (самое новое сверху)
  feedPosts.sort((a,b)=>b.time - a.time);
  feedPosts.forEach(p => {
    const card = document.createElement('div');
    card.className='post-card';
    let mediaTag='';
    if (p.mediaType==='image') {
      mediaTag=`<img src="${p.mediaSrc}" class="post-image"/>`;
    } else if (p.mediaType==='video') {
      mediaTag=`<video src="${p.mediaSrc}" class="post-image" controls></video>`;
    }
    // Лайки и комментарии
    const likesCount = p.likes?.length || 0;
    const commentsCount = p.comments?.length || 0;
    card.innerHTML=`
      ${mediaTag}
      <div class="post-content">
        <p>${p.caption}</p>
        <div class="post-buttons">
          <button class="icon-btn" data-id="${p.id}" title="Нравится" onclick="toggleLike('${p.id}')">&hearts;</button>
          <span>${likesCount} лайков</span>
        </div>
        <div class="comments" id="comments-${p.id}">
          ${p.comments?.map(c => `<div class="comment"><b>${c.username}:</b> ${c.text}</div>`).join('')}
        </div>
        <input type="text" placeholder="Добавить комментарий" style="width:80%; border-radius:15px; border:none; padding:8px; font-family: 'Bubblegum Sans', cursive;" 
        onkeydown="if(event.key==='Enter'){addComment('${p.id}', this.value); this.value='';}">
      </div>
    `;
    postsFeed.appendChild(card);
  });
}

/* Лайки */
function toggleLike(postId) {
  const post = posts.find(p => p.id===postId);
  if (!post.likes) post.likes=[];
  const userId = getCurrentUserId();
  const index = post.likes.indexOf(userId);
  if (index===-1) {
    post.likes.push(userId);
  } else {
    post.likes.splice(index,1);
  }
  saveData();
  renderFeed();
}

/* Комментарии */
function addComment(postId, text) {
  if (!text.trim()) return;
  const post = posts.find(p => p.id===postId);
  if (!post.comments) post.comments=[];
  post.comments.push({username:currentUser.username, text});
  saveData();
  renderFeed();
}

/* Создать новый пост */
function showNewPost() {
  currentView='newPost';
  authSection.style.display='none';
  profileSection.style.display='none';
  feedSection.style.display='none';
  newPostSection.style.display='block';
  editProfileSection.style.display='none';
  messagesSection.style.display='none';
  document.getElementById('post-media').value='';
  document.getElementById('post-caption').value='';
}

/* Отправка поста */
function submitPost() {
  const file = inputPostMedia.files[0];
  const caption = inputPostCaption.value.trim();
  if (!file) {
    showNotification('Выберите медиа!');
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    const mediaSrc = reader.result;
    const id = 'post_' + Date.now();
    const mediaType = file.type.startsWith('video') ? 'video' :'image';
    posts.push({
      id,
      authorId: getCurrentUserId(),
      mediaSrc,
      mediaType,
      caption,
      time: Date.now(),
      likes: [],
      comments: []
    });
    saveData();
    showNotification('Пост опубликован!');
    showProfile();
  };
  reader.readAsDataURL(file);
}

/* Получение текущего */
function getCurrentUserId() {
  for (let key in users) {
    if (users[key].email===currentUser.email) return key;
  }
  return null;
}

/* Показ профиля редактирования */
function showEditProfile() {
  currentView='editProfile';
  document.getElementById('auth-section').style.display='none';
  document.getElementById('profile-section').style.display='none';
  document.getElementById('feed-section').style.display='none';
  document.getElementById('new-post-section').style.display='none';
  document.getElementById('edit-profile-section').style.display='block';
  document.getElementById('messages-section').style.display='none';
  // Заполнить текущие данные
  inputEditName.value = currentUser.username;
  inputEditBio.value = currentUser.bio;
  if (currentUser.avatar) {
    document.querySelector('#edit-avatar').nextElementSibling?.remove();
  }
}

/* Сохранить профиль */
function saveProfile() {
  const name = inputEditName.value.trim() || currentUser.username;
  const bio = inputEditBio.value.trim();
  const file = document.getElementById('edit-avatar').files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ()=> {
      currentUser.avatar = reader.result;
      finalizeProfileSave(name, bio);
    }
    reader.readAsDataURL(file);
  } else {
    finalizeProfileSave(name, bio);
  }
}

function finalizeProfileSave(name, bio) {
  currentUser.username=name;
  currentUser.bio=bio;
  // Обновим
  users[getCurrentUserId()] = currentUser;
  saveData();
  showNotification('Профиль сохранен');
  showProfile();
}

/* Показ профиля */
function showDialogs() {
  // Тут можно сделать список диалогов
}

/* Открыть чат */
function openChat(userId) {
  currentChatUser = users[userId];
  currentView='messages';
  authSection.style.display='none';
  profileSection.style.display='none';
  feedSection.style.display='none';
  newPostSection.style.display='none';
  editProfileSection.style.display='none';
  messagesSection.style.display='block';

  document.getElementById('dialog-user').innerText = currentChatUser.username;
  renderMessages(userId);
}

/* Рендер сообщений */
function renderMessages(userId) {
  chatMessages.innerHTML='';
  const convo = messages.filter(m => 
    (m.from===getCurrentUserId() && m.to===userId) || 
    (m.from===userId && m.to===getCurrentUserId())
  );
  convo.sort((a,b)=> a.time - b.time);
  convo.forEach(msg => {
    const msgDiv = document.createElement('div');
    msgDiv.className='message ' + (msg.from===getCurrentUserId() ? 'you':'');
    msgDiv.innerText=msg.text;
    chatMessages.appendChild(msgDiv);
  });
  chatMessages.scrollTop=chatMessages.scrollHeight;
}

/* Отправить сообщение */
function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;
  const fromId = getCurrentUserId();
  const toId = Object.keys(users).find(k => users[k].username===currentChatUser.username);
  if (!toId) {
    showNotification('Пользователь недоступен');
    return;
  }
  messages.push({
    from: fromId,
    to: toId,
    text,
    time: Date.now()
  });
  saveData();
  messageInput.value='';
  renderMessages(toId);
  showNotification('Сообщение отправлено');
}

/* Поиск пользователей */
function searchUsers() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const results = [];
  for (let k in users) {
    if (users[k].username.toLowerCase().includes(query) && users[k].id!==getCurrentUserId()) {
      results.push(users[k]);
    }
  }
  // вывод результата
  let container = document.getElementById('search-results');
  if (!container) {
    container = document.createElement('div');
    container.id='search-results';
    container.style.border='1px solid #ccc';
    container.style.borderRadius='15px';
    container.style.padding='10px';
    container.style.marginTop='10px';
    document.querySelector('.auth-form').appendChild(container);
  }
  container.innerHTML='';
  results.forEach(u => {
    const div = document.createElement('div');
    div.className='bubble';
    div.innerText=u.username;
    const btn = document.createElement('button');
    btn.innerText='Подписаться';
    btn.className='btn-primary';
    btn.style.marginLeft='10px';
    btn.onclick= ()=> { toggleFollow(u.id); };
    div.appendChild(btn);
    container.appendChild(div);
  });
}

/* Подписаться/отписаться */
function toggleFollow(userId) {
  const currentUserId = getCurrentUserId();
  if (!followings[currentUserId]) followings[currentUserId]=[];
  const index = followings[currentUserId].indexOf(userId);
  if (index===-1) {
    followings[currentUserId].push(userId);
    // добавляем в подписчиков
    if (!users[userId].followers) users[userId].followers=[];
    if (!users[userId].followers.includes(currentUserId))
      users[userId].followers.push(currentUserId);
    showNotification('Подписались');
  } else {
    followings[currentUserId].splice(index,1);
    // удаляем из подписчиков
    if (users[userId].followers)
      users[userId].followers= users[userId].followers.filter(fid=>fid!==currentUserId);
    showNotification('Открестились');
  }
  saveData();
}

/* Скролл сообщений */
function scrollChat() {
  chatMessages.scrollTop=chatMessages.scrollHeight;
}

/* Инициализация страницы */
function init() {
  // Если есть текущий пользователь
  if (localStorage.getItem('currentUser')) {
    currentUser = JSON.parse(localStorage.getItem('currentUser'));
    // обновить users по email
    for (let k in users) {
      if (users[k].email===currentUser.email) {
        currentUser = users[k];
        break;
      }
    }
    toggleAuth();
  } else {
    toggleAuth();
  }

  // Обновление данных полотна
  document.getElementById('search-input').addEventListener('keydown', (e)=>{
    if (e.key==='Enter') searchUsers();
  });
  // Навигация
  document.getElementById('btn-profile').onclick= ()=> showProfile();
  document.getElementById('btn-login').onclick= ()=> {
    authSection.style.display='flex';
  };
}

/* Запуск */
init();

</script>
